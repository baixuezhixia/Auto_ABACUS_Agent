abacus:
  executable: "abacus"
  run_mode: "mpirun"  # mpirun or local
  np: 12
  pseudo_dir: "abacus_resources/Pseudopotential"
  orbital_dir: "abacus_resources/StandardOrbitals"

decoder:
  mode: "llm"   # rule, auto, llm
  model: "deepseek-reasoner"
  base_url: "https://api.deepseek.com"   # e.g. https://api.openai.com/v1 or an OpenAI-compatible endpoint
  api_key: ""
  temperature: 0.0
  timeout: 60

mp_selection:
  hard_limit: 5
  llm:
    enabled: true
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com"
    api_key: ""
    temperature: 0.0
    timeout: 60

MP_API_KEY: ""
